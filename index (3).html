<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الأستاذ فيصل الدبياني - لغة عربية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f0f4f8;
            user-select: none;
            overflow-x: hidden;
        }
        .unit-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .timer-bar {
            transition: width 1s linear;
        }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Character Animation */
        .character-pop {
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp {
            0% { transform: scale(0) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

                    <span class="relative z-10">وحدة النحو</span>

            </div>
        </div>

            </div>
        </div>

        <div id="quizScreen" class="hidden fade-in relative">

            </div>

            </div>
        </div>

    </main>

                timeLeft--;

                if (timeLeft <= 0) {

    png.src = isCorrect ? charCorrect : charWrong;
    
    // السطر الجديد اللي هيكبر الصورة
    png.style.width = "300px"; 
    
    feedback.classList.remove('hidden');
}


        function playSound(id) {
            const sound = document.getElementById(id);
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Audio play failed: ", e));
        }

        document.getElementById('nextBtn').onclick = () => {
            currentQuestionIdx++;
            if (currentQuestionIdx < currentLesson.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            quizScreen.classList.add('hidden');
            scoreDisplay.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            backBtn.classList.add('hidden');
            
            const total = currentLesson.length;
            document.getElementById('finalScore').innerText = `${score} / ${total}`;
            
            const eval = document.getElementById('evaluation');
            const percent = (score / total) * 100;
            
            if (percent === 100) eval.innerText = "عم الناس اهو.";
            else if (percent >= 80) eval.innerText = "ايوة المذاكرة ياعم.";
            else if (percent >= 50) eval.innerText = "كويس يامحترم.";
            else eval.innerText = "ذاكر تاتي يا معفن.";
        }

    </script>
</body>
</html>
